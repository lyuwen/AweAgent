# BeyondSWE Search Mode Configuration
# Usage: awe-agent run -c configs/tasks/beyond_swe_search.yaml

llm: "!include ../llm/azure.yaml"

runtime:
  backend: docker
  timeout: 14400
  workdir: /testbed
  resource_limits:
    cpu: "4"
    memory: "8Gi"

agent:
  type: search_swe
  max_steps: 200
  enable_search: true
  tools:
    - bash
    - editor
    - search
    - link_summary
  bash_timeout: 1200

task:
  type: beyond_swe
  dataset_id: beyond_swe
  data_file: ${DATA_FILE}

eval:
  enabled: true
  isolated: true
  timeout: 3600

execution:
  max_concurrent: 50
  max_retries: 3
  output_path: ./results/beyond_swe_search
  output_format: jsonl

security:
  bash_blacklist:
    - ".*git clone.*"
    - ".*git fetch.*"
    - ".*git pull.*"
    - ".*curl.*github\\.com.*"
    - ".*wget.*github\\.com.*"
