# Ark (Volcengine) backend for LinkSummaryTool — dpsk v3.2
# Usage:
#   export LINK_SUMMARY_CONFIG_PATH=configs/llm/link_summary/ark.yaml
#   export LINK_SUMMARY_ARK_API_KEY=...

backend: ark
base_url: ${LINK_SUMMARY_ARK_BASE_URL}
api_key: ${LINK_SUMMARY_ARK_API_KEY}
model: ${LINK_SUMMARY_ARK_MODEL}
params:
  max_completion_tokens: 32768
