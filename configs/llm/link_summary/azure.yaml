# Azure OpenAI backend for LinkSummaryTool
# Usage:
#   export LINK_SUMMARY_CONFIG_PATH=configs/llm/link_summary/azure.yaml
#   export LINK_SUMMARY_MODEL=gpt-5.2-2025-12-11   (optional, overrides model below)

backend: azure
azure_endpoint: ${LINK_SUMMARY_AZURE_ENDPOINT}
api_version: ${LINK_SUMMARY_API_VERSION:-2024-03-01-preview}
api_key: ${LINK_SUMMARY_API_KEY}
model: gpt-5-2025-08-07
params:
  # temperature: 1  # gpt-5 only supports temperature=1
  max_completion_tokens: 32768
